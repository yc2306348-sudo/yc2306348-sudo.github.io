<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国图公开课 - 首页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <div class="container">
      <div class="logo">国图公开课</div>
      <ul class="nav">
        <li>首页</li>
        <li>全部课程</li>
        <li>专题</li>
        <li>名师讲堂</li>
        <li>搜索</li>
      </ul>
    </div>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <div class="container">
      <span>全部课程</span>
      <span class="active">推荐</span>
      <span>最新</span>
      <span>最热</span>
    </div>
  </div>

  <!-- 课程列表 -->
  <div class="container">
    <div class="course-list" id="courseList"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
